task_name: pick_box_to_bin
version: v1
instruction_templates:
  - 把红色盒子放进右边收纳盒
  - Pick up the box and place it into the bin.

description: |
  Pick a small box from the tabletop and place it into the designated storage bin.
  This is the first formal task in the shelf demo project and serves as the main
  entry point for data collection, task validation, and imitation-learning baselines.

workspace:
  name: tabletop_workspace
  table_size_m: [0.80, 0.60]
  robot_base_frame: base_link
  gravity_axis: +z

objects:
  primary:
    type: box
    size_m: [0.05, 0.05, 0.05]
    color_options: [red, blue, green, yellow]
    pose_init:
      region: left_half_of_table
      z_m: 0.025
  target_bin:
    type: open_bin
    size_m: [0.18, 0.18, 0.10]
    color: gray
    pose_init:
      region: right_half_of_table
      z_m: 0.05

initial_state:
  robot:
    ee_pose_xyzrpy: [0.30, -0.10, 0.25, 3.14, 0.0, 0.0]
    gripper_open: true
  scene:
    object_on_table: true
    object_in_bin: false
    bin_empty: true

goal_state:
  object_in_target_bin: true
  object_stable: true
  gripper_released: true

action_space:
  mode: delta_end_effector_pose_with_gripper
  action_dim: 7
  fields: [dx, dy, dz, droll, dpitch, dyaw, gripper_delta]
  control_hz: 10
  limits:
    translation_step_m: 0.05
    rotation_step_rad: 0.20
    gripper_delta_range: [-1.0, 1.0]

observation:
  modalities:
    - top_rgb
    - wrist_rgb
    - robot_state
  state_fields:
    - ee_pose_xyzrpy
    - gripper_open
    - object_pose_xyz
    - bin_pose_xyz
    - phase
  image_size: [320, 240]

success_criteria:
  in_target_bin: true
  released: true
  object_upright: true
  settle_time_sec: 2.0
  min_volume_ratio_in_bin: 0.80

failure_criteria:
  drop_during_transfer: true
  object_out_of_workspace: true
  self_collision: true
  timeout_sec: 30

randomization:
  enabled: true
  object_xy_jitter_cm: 5
  bin_xy_jitter_cm: 3
  lighting_variation: mild
  camera_brightness_jitter: mild

evaluation:
  num_trials: 20
  metrics:
    - success_rate
    - mean_completion_time
    - failure_reason_distribution

notes: |
  This config is intentionally compact but complete enough to support task validation,
  synthetic data generation, and later rollout evaluation.
