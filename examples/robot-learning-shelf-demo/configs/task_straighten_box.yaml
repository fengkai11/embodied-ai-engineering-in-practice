task_name: straighten_box
version: v1
instruction_templates:
  - 把歪掉的盒子摆正
  - Straighten the tilted box.

description: |
  Re-orient a box so that its bottom face lies flat on the tabletop and the box
  is aligned with the table surface.

workspace:
  name: tabletop_workspace
  table_size_m: [0.80, 0.60]

objects:
  primary:
    type: box
    size_m: [0.06, 0.04, 0.04]
    tilt_angle_deg_range: [15, 60]
    pose_init:
      region: center_of_table
      z_m: 0.02

initial_state:
  robot:
    gripper_open: true
  scene:
    object_tilted: true

goal_state:
  object_upright: true
  object_static: true

action_space:
  mode: delta_end_effector_pose_with_gripper
  action_dim: 7
  control_hz: 10

observation:
  modalities: [top_rgb, robot_state]

success_criteria:
  tilt_angle_deg_max: 5
  object_static: true

failure_criteria:
  object_out_of_workspace: true
  timeout_sec: 20

randomization:
  object_xy_jitter_cm: 4
  object_yaw_deg: [0, 180]
  lighting_variation: mild
